<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Sistem Keuangan Baitul Maal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1a5276, #2e86c1); min-height: 100vh; display: flex; align-items: center; }
  .card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
  .logo-title { color: #1a5276; font-weight: 700; font-size: 1.1rem; }
  .btn-login { background: #1a5276; border: none; }
  .btn-login:hover { background: #154360; }
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4 col-sm-8 col-11">
      <div class="card p-4">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🕌</div>
          <div class="logo-title">SISTEM KEUANGAN</div>
          <div class="logo-title">BAITUL MAAL</div>
          <small class="text-muted">Manajemen ZIS & Keuangan</small>
        </div>
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
          </div>
          <button type="submit" class="btn btn-login btn-primary w-100 fw-semibold">Masuk</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
