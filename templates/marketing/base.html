<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a5276">
<title>{% block title %}Marketing{% endblock %} — Baitul Maal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --success: #1e8449;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-h: 62px;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    background: #dde4ec;
    padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Mobile frame: max 480px centered ───────────────── */
  .app-shell {
    max-width: 480px;
    margin: 0 auto;
    background: #f0f4f8;
    min-height: 100dvh;
    position: relative;
  }

  /* ── Top bar ─────────────────────────────────────────── */
  .topbar {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    padding: .65rem 1rem;
    padding-top: calc(.65rem + env(safe-area-inset-top, 0px));
    position: sticky; top: 0; z-index: 99;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .topbar-title { font-size: .95rem; font-weight: 700; letter-spacing: .02em; }
  .topbar-sub   { font-size: .72rem; opacity: .8; }

  /* ── Bottom nav ──────────────────────────────────────── */
  .bottom-nav {
    position: fixed; bottom: 0; z-index: 100;
    background: #fff;
    border-top: 1px solid #e0e6ed;
    display: flex;
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    box-shadow: 0 -2px 12px rgba(0,0,0,.08);
    width: 100%;
    max-width: 480px;
    left: 50%; transform: translateX(-50%);
  }
  .bottom-nav a {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: #94a3b8; text-decoration: none;
    font-size: .62rem; font-weight: 500; gap: 3px;
    padding: 6px 0;
    transition: color .15s;
  }
  .bottom-nav a.active { color: var(--primary); }
  .bottom-nav a i { font-size: 1.35rem; line-height: 1; }
  .bottom-nav a.active i { font-weight: 900; }

  /* ── Cards ───────────────────────────────────────────── */
  .card {
    border: none; border-radius: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,.07);
  }
  .card-flat { border-radius: 14px; border: 1px solid #e9eef4; box-shadow: none; }

  /* ── Badges ──────────────────────────────────────────── */
  .badge-masuk  { background: #d5f5e3; color: #1e8449; }
  .badge-keluar { background: #fadbd8; color: #922b21; }

  /* ── Buttons ─────────────────────────────────────────── */
  .btn { border-radius: 10px; font-weight: 500; }
  .btn-lg { padding: .75rem 1.5rem; font-size: 1rem; }
  .btn-primary { background: var(--primary); border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-light); border-color: var(--primary-light); }

  /* ── Flash messages ──────────────────────────────────── */
  .alert { border-radius: 12px; font-size: .875rem; border: none; }

  /* ── Section label ───────────────────────────────────── */
  .section-label {
    font-size: .7rem; font-weight: 700; letter-spacing: .08em;
    color: #94a3b8; text-transform: uppercase; margin-bottom: .5rem;
  }
</style>
</head>
<body>
<div class="app-shell">

<div class="topbar d-flex justify-content-between align-items-center">
  <div>
    <div class="topbar-title">🕌 Baitul Maal</div>
    <div class="topbar-sub">{{ session.nama }}</div>
  </div>
  <a href="/logout" class="text-white" style="opacity:.8; font-size:.85rem; text-decoration:none">
    <i class="bi bi-box-arrow-right fs-5"></i>
  </a>
</div>

<div class="p-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<nav class="bottom-nav">
  <a href="/marketing" class="{% if request.path == '/marketing' %}active{% endif %}">
    <i class="bi bi-house{% if request.path == '/marketing' %}-fill{% endif %}"></i>
    <span>Beranda</span>
  </a>
  <a href="/marketing/koleksi" class="{% if 'koleksi' in request.path %}active{% endif %}">
    <i class="bi bi-basket{% if 'koleksi' in request.path %}-fill{% endif %}"></i>
    <span>Fundraising</span>
  </a>
  <a href="/marketing/peta" class="{% if 'peta' in request.path %}active{% endif %}">
    <i class="bi bi-map{% if 'peta' in request.path %}-fill{% endif %}"></i>
    <span>Peta</span>
  </a>
  <a href="/marketing/catat" class="{% if request.path == '/marketing/catat' %}active{% endif %}">
    <i class="bi bi-plus-circle{% if request.path == '/marketing/catat' %}-fill{% endif %}"></i>
    <span>Catat</span>
  </a>
  <a href="/marketing/riwayat" class="{% if 'riwayat' in request.path %}active{% endif %}">
    <i class="bi bi-clock-history"></i>
    <span>Riwayat</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</div>{# /app-shell #}
</body>
</html>
