<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>{% block title %}Marketing{% endblock %} — Baitul Maal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root { --primary: #1a5276; }
  body { background: #f0f4f8; padding-bottom: 70px; font-size: 15px; }
  .topbar {
    background: var(--primary); color: #fff;
    padding: .75rem 1rem; position: sticky; top: 0; z-index: 99;
  }
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: #fff; border-top: 1px solid #ddd;
    display: flex; height: 60px;
  }
  .bottom-nav a {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: #888; text-decoration: none;
    font-size: .65rem; gap: 2px;
  }
  .bottom-nav a.active { color: var(--primary); }
  .bottom-nav a i { font-size: 1.3rem; }
  .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
  .badge-masuk { background: #d5f5e3; color: #1e8449; }
  .badge-keluar { background: #fadbd8; color: #922b21; }
</style>
</head>
<body>

<div class="topbar d-flex justify-content-between align-items-center">
  <div>
    <div class="fw-bold" style="font-size:.9rem">🕌 BAITUL MAAL</div>
    <div style="font-size:.75rem; opacity:.8">{{ session.nama }}</div>
  </div>
  <a href="/logout" class="text-white text-decoration-none" style="font-size:.8rem">
    <i class="bi bi-box-arrow-right"></i>
  </a>
</div>

<div class="p-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<nav class="bottom-nav">
  <a href="/marketing" class="{% if request.path == '/marketing' %}active{% endif %}">
    <i class="bi bi-house"></i> Beranda
  </a>
  <a href="/marketing/catat" class="{% if '/catat' in request.path %}active{% endif %}">
    <i class="bi bi-plus-circle"></i> Catat
  </a>
  <a href="/marketing/riwayat" class="{% if '/riwayat' in request.path %}active{% endif %}">
    <i class="bi bi-clock-history"></i> Riwayat
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
