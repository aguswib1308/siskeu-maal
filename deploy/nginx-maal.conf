# /etc/nginx/sites-available/bmt-maal
# Akses: http://103.169.207.190:8080
# Jika punya subdomain: ganti listen 8080 -> listen 80
#                        dan tambah: server_name maal.domainkamu.com;

server {
    listen 8080;
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/bmt-maal/static/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60;
    }
}
